name: 提交公益竞赛 / Submit Competition
description: 提交一个公益竞赛信息，添加到 data/competitions.yml / Submit a public welfare competition to be added to data/competitions.yml
title: "[竞赛] 竞赛名称 / [Competition] Competition Title"
labels:
  - competition
body:
  - type: markdown
    attributes:
      value: |
        ## 提交说明 / Submission Guidelines

        请参考 [数据结构说明](../blob/main/README.md#数据结构) 填写以下信息，您提交的竞赛将被添加到 `data/competitions.yml`。
        Please refer to the [data structure documentation](../blob/main/README.md#数据结构) and fill in the following fields. Your submission will be added to `data/competitions.yml`.

  - type: input
    id: title
    attributes:
      label: 竞赛名称 / Competition Title
      description: 竞赛的完整名称 / Full name of the competition
      placeholder: "例如：第五届"创新杯"中国高校ESG案例大赛 / Example: 5th Innovation Cup China University ESG Case Competition"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 竞赛简介 / Competition Description
      description: 竞赛的简要介绍 / Brief description of the competition
      placeholder: "请描述竞赛的主要内容、参赛资格和意义 / Please describe the main content, eligibility, and significance of the competition"
    validations:
      required: true

  - type: input
    id: tags
    attributes:
      label: 分类标签 / Tags
      description: 请用英文逗号分隔多个标签 / Please use commas to separate multiple tags
      placeholder: "例如：ESG, 案例大赛, 高校竞赛, 可持续发展 / Example: ESG, 案例大赛, 高校竞赛"
    validations:
      required: true

  - type: input
    id: year
    attributes:
      label: 年份 / Year
      description: 竞赛举办年份 / Year the competition takes place
      placeholder: "例如：2025"
    validations:
      required: true

  - type: input
    id: id
    attributes:
      label: 唯一 ID / Unique ID
      description: 竞赛的全局唯一标识符，建议使用英文小写和连字符 / Globally unique identifier for the competition, use lowercase English and hyphens
      placeholder: "例如：innovation-cup-esg-case-2025"
    validations:
      required: true

  - type: input
    id: link
    attributes:
      label: 竞赛链接 / Competition Link
      description: 竞赛的官方链接或详情页面 / Official link or detail page of the competition
      placeholder: "例如：https://mp.weixin.qq.com/s/... / Example: https://example.com/competition"
    validations:
      required: true

  - type: textarea
    id: timeline
    attributes:
      label: 关键时间节点 / Timeline
      description: 每行一个时间节点，格式为"ISO 8601 日期 | 说明"，例如"2025-09-01T00:00:00 | 报名开始" / One timeline entry per line, format "ISO 8601 date | comment"
      placeholder: |
        2025-09-01T00:00:00 | 报名开始 / Registration starts
        2025-10-31T23:59:00 | 作品提交截止 / Submission deadline
        2025-12-01T09:00:00 | 颁奖典礼 / Award ceremony
    validations:
      required: true

  - type: input
    id: timezone
    attributes:
      label: 时区 / Timezone
      description: 请使用标准 IANA 时区名称 / Please use standard IANA timezone name
      placeholder: "例如：Asia/Shanghai"
    validations:
      required: true

  - type: input
    id: date
    attributes:
      label: 人类可读日期 / Human-readable Date
      description: 人类可读的日期或日期范围 / Human-readable date or date range
      placeholder: "例如：2025年9月1日 或 2025年9月1日-12月1日"
    validations:
      required: true

  - type: input
    id: place
    attributes:
      label: 竞赛地点 / Place
      description: 竞赛地点，线上竞赛直接填写"线上" / Location of the competition; write "线上" for online competitions
      placeholder: "例如：中国，北京 或 线上 / Example: 中国，北京 or 线上"
    validations:
      required: true

  - type: checkboxes
    id: confirmation
    attributes:
      label: 我确认 / I Confirm
      options:
        - label: 提供的信息真实准确 / The information provided is truthful and accurate
          required: true
        - label: 我已阅读数据结构说明 / I have read the data structure documentation
          required: true
